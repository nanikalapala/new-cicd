name: Insurance Portal CI/CD

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: insurance-portal

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Project Files
        run: |
          echo "Verifying required project files..."
          test -f server.js && echo "✓ server.js found"
          test -f Dockerfile && echo "✓ Dockerfile found"
          test -f package.json && echo "✓ package.json found"
          test -f public/index.html && echo "✓ public/index.html found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate JavaScript Syntax
        run: node --check server.js

      - name: Run Linter (if configured)
        run: npm run lint --if-present || echo "Linter not configured"

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/insurance-portal
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: Deploy to EC2
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "Starting deployment process..."
            
            # Pull latest image
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest
            
            # Stop and remove old container
            echo "Stopping old container..."
            docker stop insurance-app || true
            docker rm insurance-app || true
            
            # Prune old images
            echo "Cleaning up old images..."
            docker image prune -f || true
            
            # Run new container
            echo "Starting new container..."
            docker run -d \
              --name insurance-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest
            
            # Verify container is running
            echo "Verifying container health..."
            sleep 5
            docker ps | grep insurance-app && echo "✓ Container is running successfully"
