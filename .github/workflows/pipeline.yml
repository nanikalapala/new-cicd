name: Insurance Portal CI/CD

on:
  push:
    branches:
      - master
      - main
      - develop

  pull_request:
    branches:
      - master
      - main

  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: insurance-portal

jobs:

  quality-security-checks:
    name: Quality & Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Validate JavaScript Syntax
        run: node --check server.js

      ####################################################
      # SonarQube Scan
      ####################################################

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      ####################################################
      # Semgrep SAST Scan
      ####################################################

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1.167.0
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      ####################################################
      # Trivy Filesystem Scan
      ####################################################

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL

  ####################################################
  # Build Docker Image
  ####################################################

  build-and-push:
    name: Build & Push Docker Image
    needs: quality-security-checks
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest .

      ####################################################
      # Trivy Image Scan
      ####################################################

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest
          severity: HIGH,CRITICAL

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest

  ####################################################
  # Deploy to EC2
  ####################################################

  deploy-to-ec2:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            echo "Pulling latest Docker image..."

            docker pull ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest

            echo "Stopping existing container..."

            docker stop insurance-app || true
            docker rm insurance-app || true

            echo "Cleaning old images..."

            docker image prune -f || true

            echo "Starting new container..."

            docker run -d \
              --name insurance-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              ${{ secrets.DOCKER_USERNAME }}/insurance-portal:latest

            echo "Waiting for application..."

            sleep 10

            docker ps | grep insurance-app

            echo "Deployment completed successfully."
