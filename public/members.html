<link rel="stylesheet" href="/members.css">
<div class="member-form">

    <h2>Add New Member</h2>

    <form action="/add-member" method="POST">

        <input
        type="text"
        name="fullname"
        placeholder="Full Name"
        required>

        <input
        type="email"
        name="email"
        placeholder="Email"
        required>

        <input
        type="text"
        name="phone"
        placeholder="Phone Number"
        required>

        <input
        type="text"
        name="policy_type"
        placeholder="Policy Type"
        required>

        <button type="submit">
            Add Member
        </button>

    </form>

</div>

<div class="member-table">

    <h2>Member Records</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Policy</th>
            </tr>
        </thead>

        <tbody id="memberData">

            <tr>
                <td>1</td>
                <td>John Doe</td>
                <td>john@gmail.com</td>
                <td>9876543210</td>
                <td>Health Insurance</td>
            </tr>

        </tbody>

    </table>

</div>
