<!DOCTYPE html>
<html>
<head>
<title>Members</title>
<link rel="stylesheet" href="/members.css">
</head>

<body>

<div class="member-form">

<h2>Add New Member</h2>

<form action="/add-member" method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<select
name="policy"
required>

<option value="">
Select Policy
</option>

<option>
Health Insurance
</option>

<option>
Life Insurance
</option>

<option>
Vehicle Insurance
</option>

<option>
Family Health Plan
</option>

</select>

<button type="submit">
Add Member
</button>

</form>

</div>

<div class="member-table">

<h2>Member Records</h2>

<table id="memberTable">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Policy</th>
</tr>

</table>

</div>

<script>

fetch('/api/members')
.then(res => res.json())
.then(data => {

let html = `
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Policy</th>
</tr>
`;

data.forEach(member => {

html += `
<tr>
<td>${member.id}</td>
<td>${member.name || ''}</td>
<td>${member.email || ''}</td>
<td>${member.phone || ''}</td>
<td>${member.policy || ''}</td>
</tr>
`;

});

document.getElementById('memberTable').innerHTML = html;

});

</script>

</body>
</html>
