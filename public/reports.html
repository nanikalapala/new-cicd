<!DOCTYPE html>
<html>
<head>
<title>Reports Dashboard</title>
<link rel="stylesheet" href="/pages.css">

<style>

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
text-align:center;
}

.stat-card h2{
font-size:38px;
margin:10px 0;
color:#2563eb;
}

.report-actions{
display:flex;
gap:20px;
margin-top:20px;
}

.report-actions button{
padding:14px 25px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:15px;
}

.report-actions button:hover{
background:#1d4ed8;
}

</style>

</head>
<body>

<div class="page-container">

<h1>Reports Dashboard</h1>

<div class="stats">

<div class="stat-card">
<h4>Total Policies</h4>
<h2 id="policiesCount">0</h2>
</div>

<div class="stat-card">
<h4>Active Policies</h4>
<h2 id="activePoliciesCount">0</h2>
</div>

<div class="stat-card">
<h4>Total Claims</h4>
<h2 id="claimsCount">0</h2>
</div>

<div class="stat-card">
<h4>Total Customers</h4>
<h2 id="customersCount">0</h2>
</div>

</div>

<div class="card">

<h2>Generate Reports</h2>

<div class="report-actions">

<button onclick="downloadPolicies()">
Policies Report
</button>

<button onclick="downloadClaims()">
Claims Report
</button>

<button onclick="downloadCustomers()">
Customers Report
</button>

</div>

</div>

</div>

<script>

fetch('/api/dashboard')
.then(res=>res.json())
.then(data=>{

document.getElementById('policiesCount').innerText =
data.totalPolicies;

document.getElementById('activePoliciesCount').innerText =
data.activePolicies;

document.getElementById('claimsCount').innerText =
data.totalClaims;

document.getElementById('customersCount').innerText =
data.totalCustomers;

});

function downloadPolicies(){
window.open('/api/policies');
}

function downloadClaims(){
window.open('/api/claims');
}

function downloadCustomers(){
window.open('/api/members');
}

</script>

<button onclick="window.location='/export/pdf'">
Export PDF
</button>

<button onclick="window.location='/export/excel'">
Export Excel
</button>

<div class="card">

<h2>🤖 AI Report Summary</h2>

<div id="aiSummary">
Loading insights...
</div>

</div>

<script>

fetch('/api/dashboard')
.then(res => res.json())
.then(data => {

document.getElementById('aiSummary')
.innerHTML = `

<strong>Business Insights</strong><br><br>

📄 Total Policies: ${data.totalPolicies}<br>
🛡 Active Policies: ${data.activePolicies}<br>
📋 Claims Submitted: ${data.totalClaims}<br>
👥 Customers: ${data.totalCustomers}<br><br>

AI Analysis:<br>
• Active policy ratio is healthy.<br>
• Customer growth is stable.<br>
• Claims volume remains manageable.<br>
• Recommend promoting new policy plans to increase revenue.<br>

`;

});

</script>

</body>
</html>
