<!DOCTYPE html>
<html>
<head>
<title>Policies Management</title>
<link rel="stylesheet" href="/pages.css">
</head>
<body>

<div class="page-container">

<h1>Policies Management</h1>

<div class="card">

<div class="header-row">
<h2>All Policies</h2>

<button onclick="showForm()">
Add Policy
</button>
</div>

<div id="policyForm" style="display:none;margin-bottom:20px;">

<form action="/add-policy" method="POST">

<input
type="text"
name="policy_name"
placeholder="Policy Name"
required>

<br><br>

<input
type="number"
name="premium"
placeholder="Premium"
required>

<br><br>

<select name="status">

<option value="Active">
Active
</option>

<option value="Pending">
Pending
</option>

<option value="Expired">
Expired
</option>

</select>

<br><br>

<button type="submit">
Save Policy
</button>

</form>

</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Policy Name</th>
<th>Premium</th>
<th>Status</th>
</tr>
</thead>

<tbody id="policyTable">
</tbody>

</table>

</div>

</div>

<script>

function showForm(){
document.getElementById('policyForm').style.display='block';
}

fetch('/api/policies')
.then(res=>res.json())
.then(data=>{

let html='';

data.forEach(policy=>{

let badge='active';

if(policy.status==='Pending'){
badge='pending';
}

if(policy.status==='Expired'){
badge='expired';
}

html+=`
<tr>
<td>${policy.id}</td>
<td>${policy.policy_name}</td>
<td>₹${policy.premium}</td>
<td>
<span class="${badge}">
${policy.status}
</span>
</td>
</tr>
`;

});

document.getElementById('policyTable').innerHTML=html;

});

</script>

</body>
</html>
